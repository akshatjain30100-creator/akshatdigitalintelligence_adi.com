<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Code Diary - React Version</title>
    
    <!-- Load React, React DOM, and Babel Compiler from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Combined CSS Stylesheet -->
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        /* Dark Mode Global Overrides */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }

        /* Header Navigation */
        header {
            background: #111;
            color: #fff;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        nav button, nav a {
            background: none;
            border: none;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        nav button:hover, nav a:hover {
            color: #00bcd4;
        }
        
        .theme-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Blog Section */
        main {
            margin-top: 40px;
            margin-bottom: 40px;
            min-height: 70vh;
        }
        .feed-intro {
            margin-bottom: 30px;
        }
        .feed-intro h2 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }
        .post {
            background: #fff;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: background-color 0.3s, transform 0.2s;
        }
        body.dark-mode .post {
            background: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .post img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .post h2, .post h3 {
            margin-bottom: 10px;
            color: #222;
        }
        body.dark-mode .post h2, body.dark-mode .post h3 {
            color: #fff;
        }
        .post .date {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 15px;
        }
        body.dark-mode .post .date {
            color: #aaa;
        }
        .post .excerpt, .post .content {
            color: #555;
        }
        body.dark-mode .post .excerpt, body.dark-mode .post .content {
            color: #ccc;
        }
        .post .content {
            font-size: 1.1rem;
            white-space: pre-line;
            line-height: 1.8;
        }
        
        /* Action Buttons */
        .action-btn {
            display: inline-block;
            margin-top: 15px;
            color: #00bcd4;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        .action-btn:hover {
            text-decoration: underline;
        }
        .back-btn {
            margin-bottom: 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            color: #fff;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- Target div where React will inject the code -->
    <div id="root"></div>

    <!-- React Execution Script via Babel -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mock Data Array
        const BLOG_POSTS = [
            {
                id: 1,
                title: "Getting Started with Web Development",
                date: "Published on May 23, 2026",
                excerpt: "Web development is an ever-evolving field. Today, we look at the core fundamentals every beginner needs to know to build their very first website...",
                content: "Web development is an ever-evolving field. Today, we look at the core fundamentals every beginner needs to know to build their very first website.\n\nTo begin, focus completely on mastering HTML for layout structure, CSS for modern styling, and raw Javascript for programmatic behavior. Once you form a concrete base with those three elements, transitioning into full UI architectural systems like React becomes an intuitive next step.",
                image: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?w=800&auto=format&fit=crop&q=60"
            },
            {
                id: 2,
                title: "The Power of CSS Grid",
                date: "Published on May 20, 2026",
                excerpt: "Grid layouts used to be a nightmare of floats and clears. Thanks to modern CSS Grid, complex, responsive layouts are now just a few lines of code away...",
                content: "Grid layouts used to be a nightmare of floats and clears. Thanks to modern CSS Grid, complex, responsive layouts are now just a few lines of code away.\n\nBy establishing a container structure via 'display: grid', you gain precise dimensional management across dual axes simultaneously. This fundamentally solves complex web layouts without demanding hacky code spacing formulas or breaking formatting workflows.",
                image: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=800&auto=format&fit=crop&q=60"
            }
        ];

        function App() {
            const [darkMode, setDarkMode] = useState(false);
            const [selectedPost, setSelectedPost] = useState(null);

            // Sync HTML body class with darkMode state
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }, [darkMode]);

            return (
                <div>
                    {/* Header Component */}
                    <header>
                        <div className="container">
                            <h1 style={{ cursor: 'pointer' }} onClick={() => setSelectedPost(null)}>
                                The Code Diary
                            </h1>
                            <nav>
                                <button onClick={() => setSelectedPost(null)}>Home</button>
                                <a href="#about">About</a>
                                <button 
                                    className="theme-toggle" 
                                    onClick={() => setDarkMode(!darkMode)}
                                    aria-label="Toggle Dark Mode"
                                >
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                            </nav>
                        </div>
                    </header>

                    {/* Main Content Component */}
                    <main className="container">
                        {selectedPost ? (
                            /* Single Full Post View */
                            <article className="post">
                                <button className="action-btn back-btn" onClick={() => setSelectedPost(null)}>
                                    ← Back to Articles
                                </button>
                                <img src={selectedPost.image} alt={selectedPost.title} />
                                <h2>{selectedPost.title}</h2>
                                <p className="date">{selectedPost.date}</p>
                                <p className="content">{selectedPost.content}</p>
                            </article>
                        ) : (
                            /* Feed Index List View */
                            <div>
                                <div className="feed-intro">
                                    <h2>The Digital Sandbox</h2>
                                    <p>Thoughts, structural guides, and coding layouts for web developers.</p>
                                </div>
                                <section className="blog-posts">
                                    {BLOG_POSTS.map((post) => (
                                        <article className="post" key={post.id}>
                                            <img src={post.image} alt={post.title} />
                                            <h3>{post.title}</h3>
                                            <p className="date">{post.date}</p>
                                            <p className="excerpt">{post.excerpt}</p>
                                            <button 
                                                className="action-btn" 
                                                onClick={() => setSelectedPost(post)}
                                            >
                                                Read More →
                                            </button>
                                        </article>
                                    ))}
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Footer Component */}
                    <footer>
                        <p>&copy; 2026 The Code Diary. Powered by React Engine.</p>
                    </footer>
                </div>
            );
        }

        // Render application inside the root node element
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
