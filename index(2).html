<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Growth Lab - Digital Marketing Hub</title>
    
    <!-- Load React, React DOM, and Babel Compiler from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Combined CSS Stylesheet -->
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #2d3748;
            background-color: #f7fafc;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        /* Dark Mode Global Overrides */
        body.dark-mode {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        /* Header Navigation */
        header {
            background: #4f46e5;
            color: #fff;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode header {
            background: #1e1b4b;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 1.7rem;
            letter-spacing: -0.5px;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .header-btn:hover {
            background: #f43f5e;
            border-color: #f43f5e;
        }

        .theme-toggle {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Blog Section */
        main {
            margin-top: 50px;
            margin-bottom: 50px;
            min-height: 70vh;
        }
        .feed-intro {
            margin-bottom: 40px;
            text-align: center;
        }
        .feed-intro h2 {
            font-size: 2.5rem;
            color: #1e1b4b;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        body.dark-mode .feed-intro h2 {
            color: #f8fafc;
        }
        .feed-intro p {
            font-size: 1.15rem;
            color: #64748b;
        }
        body.dark-mode .feed-intro p {
            color: #94a3b8;
        }

        /* Form Layout Styles */
        .form-card {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            max-width: 700px;
            margin: 0 auto 35px auto;
        }
        body.dark-mode .form-card {
            background: #1e293b;
        }
        .form-card h2 {
            margin-bottom: 20px;
            color: #1e1b4b;
        }
        body.dark-mode .form-card h2 {
            color: #f8fafc;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            background: #f8fafc;
            color: inherit;
        }
        body.dark-mode .form-group input, body.dark-mode .form-group textarea {
            border-color: #334155;
            background: #0f172a;
        }
        .submit-btn {
            background: #4f46e5;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #4338ca;
        }

        /* Post Card Styles */
        .post {
            background: #fff;
            padding: 30px;
            margin-bottom: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .post:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        body.dark-mode .post {
            background: #1e293b;
        }
        .post img {
            width: 100%;
            height: auto;
            max-height: 420px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .post h2, .post h3 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #0f172a;
            font-weight: 700;
            padding-right: 40px;
        }
        body.dark-mode .post h2, body.dark-mode .post h3 {
            color: #f8fafc;
        }
        .post .date {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }
        body.dark-mode .post .date {
            color: #94a3b8;
        }
        .post .excerpt, .post .content {
            color: #475569;
        }
        body.dark-mode .post .excerpt, body.dark-mode .post .content {
            color: #cbd5e1;
        }
        .post .content {
            font-size: 1.15rem;
            white-space: pre-line;
            line-height: 1.8;
        }
        
        /* Action Buttons */
        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .action-btn {
            color: #4f46e5;
            background: none;
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
        }
        body.dark-mode .action-btn {
            color: #818cf8;
        }
        .action-btn:hover {
            color: #f43f5e;
            text-decoration: underline;
        }
        .back-btn {
            margin-bottom: 25px;
        }

        /* Delete Button styling */
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 0.90rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
            opacity: 0.7;
        }
        .delete-btn:hover {
            background: #fee2e2;
            color: #b91c1c;
            opacity: 1;
        }
        body.dark-mode .delete-btn:hover {
            background: #451a03;
            color: #fca5a5;
        }

        /* Footer Section Styling */
        footer {
            text-align: center;
            padding: 35px 20px;
            background: #0f172a;
            color: #94a3b8;
            margin-top: 60px;
            border-top: 1px solid #1e293b;
        }
        footer .brand-name {
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_POSTS = [
            {
                id: 1,
                title: "Demystifying Modern SEO: Content Strategies that Rank in 2026",
                date: "Published on May 23, 2026",
                excerpt: "Search engine algorithms are shifting away from keyword stuffing toward genuine user search intent...",
                content: "Search engine algorithms are shifting away from keyword stuffing toward genuine user search intent and semantic analysis. Creating thin content around a target keyword phrase no longer cuts it.\n\nTo build authority, focus heavily on developing comprehensive topic clusters. This means writing deep foundational pillar articles supported by secondary, internal-linked subtopics.",
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1200&auto=format&fit=crop&q=80"
            },
            {
                id: 2,
                title: "Maximizing ROI: A Blueprint for Scaling High-Conversion Paid Ads",
                date: "Published on May 20, 2026",
                excerpt: "Paid client acquisition channels demand precision. Discover how small, localized changes to landing page tracking and behavioral creative assets completely shift campaign returns...",
                content: "Paid client acquisition channels demand financial and visual precision. Scaling budget limits blindly without analyzing down-funnel retention will kill profit margins rapidly.\n\nFirst, focus efforts completely on building localized, lightning-fast landing pages with singular actions.",
                image: "https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=1200&auto=format&fit=crop&q=80"
            }
        ];

        function App() {
            const [posts, setPosts] = useState(INITIAL_POSTS);
            const [darkMode, setDarkMode] = useState(false);
            const [selectedPost, setSelectedPost] = useState(null);
            const [view, setView] = useState("feed");

            // Form Fields State
            const [title, setTitle] = useState("");
            const [excerpt, setExcerpt] = useState("");
            const [content, setContent] = useState("");
            const [image, setImage] = useState("");

            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }, [darkMode]);

            // Handle New Post Submission
            const handleCreatePost = (e) => {
                e.preventDefault();
                
                const newPost = {
                    id: Date.now(),
                    title: title,
                    date: `Published on ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`,
                    excerpt: excerpt,
                    content: content,
                    image: image || "https://images.unsplash.com/photo-1432821596592-e2c18b78144f?w=1200&auto=format&fit=crop&q=80"
                };

                setPosts([newPost, ...posts]);
                setTitle(""); setExcerpt(""); setContent(""); setImage("");
                setView("feed");
            };

            // Secure Owner-Only Delete Handling
            const handleDeletePost = (idToDelete, e) => {
                e.stopPropagation(); // Stop parent click events
                
                // 1. Prompt for Owner Verification
                const passwordInput = prompt("🔒 Owner Verification Required:\nPlease enter the Admin Password to delete this post:");
                
                // 2. Validate input matches exactly "Aksh2006@$"
                if (passwordInput === "Aksh2006@$") {
                    const filteredPosts = posts.filter(post => post.id !== idToDelete);
                    setPosts(filteredPosts);
                    alert("✅ Post successfully deleted by Owner.");
                    
                    if (selectedPost && selectedPost.id === idToDelete) {
                        setSelectedPost(null);
                    }
                } else if (passwordInput !== null) {
                    // Password validation failed
                    alert("❌ Access Denied: Incorrect password. Only the website owner can delete content.");
                }
            };

            return (
                <div>
                    {/* Navigation Bar */}
                    <header>
                        <div className="container">
                            <h1 style={{ cursor: 'pointer' }} onClick={() => { setSelectedPost(null); setView("feed"); }}>
                                🚀 The Growth Lab
                            </h1>
                            <nav>
                                <button className="header-btn" onClick={() => { setSelectedPost(null); setView(view === "create" ? "feed" : "create"); }}>
                                    {view === "create" ? "📋 View Feed" : "✍️ Create Post"}
                                </button>
                                <button 
                                    className="theme-toggle" 
                                    onClick={() => setDarkMode(!darkMode)}
                                    aria-label="Toggle Dark Mode"
                                >
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                            </nav>
                        </div>
                    </header>

                    {/* Main Content Arena */}
                    <main className="container">
                        
                        {/* VIEW 1: Write / Create Post Form */}
                        {view === "create" && (
                            <div className="form-card">
                                <h2>Share Your Marketing Insights</h2>
                                <form onSubmit={handleCreatePost}>
                                    <div className="form-group">
                                        <label>Article Title</label>
                                        <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g., 5 Copywriting Tricks to Double Conversions" required />
                                    </div>
                                    <div className="form-group">
                                        <label>Short Excerpt</label>
                                        <input type="text" value={excerpt} onChange={(e) => setExcerpt(e.target.value)} placeholder="Brief summary to catch the reader's eye..." required />
                                    </div>
                                    <div className="form-group">
                                        <label>Cover Image URL</label>
                                        <input type="url" value={image} onChange={(e) => setImage(e.target.value)} placeholder="https://example.com/image.jpg" />
                                    </div>
                                    <div className="form-group">
                                        <label>Full Content Body</label>
                                        <textarea rows="8" value={content} onChange={(e) => setContent(e.target.value)} placeholder="Write your full article structure here..." required></textarea>
                                    </div>
                                    <button type="submit" className="submit-btn">Publish Article Live</button>
                                </form>
                            </div>
                        )}

                        {/* VIEW 2: Individual Full Article View */}
                        {view === "feed" && selectedPost && (
                            <article className="post">
                                <button className="action-btn back-btn" onClick={() => setSelectedPost(null)}>
                                    ← Back to Hub
                                </button>
                                <img src={selectedPost.image} alt={selectedPost.title} />
                                <p className="date">{selectedPost.date}</p>
                                <h2>{selectedPost.title}</h2>
                                <p className="content">{selectedPost.content}</p>
                                
                                <div style={{ marginTop: '30px', borderTop: '1px solid #e2e8f0', paddingTop: '20px', display: 'flex', justifyContent: 'flex-end' }}>
                                    <button className="delete-btn" onClick={(e) => handleDeletePost(selectedPost.id, e)}>
                                        🔒 Owner Delete
                                    </button>
                                </div>
                            </article>
                        )}

                        {/* VIEW 3: Marketing Post Index Feed */}
                        {view === "feed" && !selectedPost && (
                            <div>
                                <div className="feed-intro">
                                    <h2>Scale Your Performance Marketing</h2>
                                    <p>Actionable tactical plays, data breakdowns, and community submitted insights.</p>
                                </div>
                                <section className="blog-posts">
                                    {posts.length === 0 ? (
                                        <p style={{ textAlign: 'center', margin: '40px 0', fontSize: '1.2rem', color: '#64748b' }}>No articles published yet. Be the first to create one!</p>
                                    ) : (
                                        posts.map((post) => (
                                            <article className="post" key={post.id}>
                                                <img src={post.image} alt={post.title} />
                                                <p className="date">{post.date}</p>
                                                <h3>{post.title}</h3>
                                                <p className="excerpt">{post.excerpt}</p>
                                                
                                                <div className="post-actions">
                                                    <button 
                                                        className="action-btn" 
                                                        onClick={() => setSelectedPost(post)}
                                                    >
                                                        Uncover Strategy →
                                                    </button>
                                                    <button 
                                                        className="delete-btn" 
                                                        onClick={(e) => handleDeletePost(post.id, e)}
                                                    >
                                                        🔒 Owner Delete
                                                    </button>
                                                </div>
                                            </article>
                                        ))
                                    )}
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Footer - Updated Brand Name */}
                    <footer>
                        <p>&copy; 2026 <span className="brand-name">Akshat Digital Intelligence ADI</span>. Open community knowledge platform.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
